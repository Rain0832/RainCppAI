<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain AI — 聊天</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>

<body>
    <div class="toast" id="toast"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>会话列表</h2>
            <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
        </div>
        <div class="session-list" id="sessionList"></div>
        <div class="sidebar-footer">
            <button id="syncBtn">同步历史</button>
            <button onclick="location.href='/menu'">返回主页</button>
        </div>
    </div>
    <div class="main">
        <div class="topbar">
            <a class="back-btn" href="/menu">← 返回</a>
            <label>模型</label>
            <select id="modelType">
                <option value="1" selected>阿里百炼</option>
                <option value="2">豆包</option>
                <option value="3">百炼 RAG</option>
                <option value="4">百炼 MCP</option>
            </select>
            <button class="theme-btn" id="themeToggle">☀️</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome-hint" id="welcomeHint">
                <span class="emoji">💬</span>
                选择左侧会话或点击「新建对话」开始聊天<br>
                <small>Enter 发送 · Shift+Enter 换行</small>
            </div>
        </div>
        <form class="input-area" id="chatForm" style="display:none">
            <textarea id="question" placeholder="输入消息..." rows="1"></textarea>
            <button type="submit" class="send-btn" id="sendBtn">发送</button>
        </form>
    </div>
    <script type="module" src="/js/ui.js"></script>
</body>

</html>
