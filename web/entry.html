<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain AI — 登录</title>
    <link rel="stylesheet" href="/css/entry.css">
</head>

<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">☀️</button>
    <div class="toast" id="toast"></div>
    <div class="wrapper">
        <div class="logo">
            <h1>Rain AI</h1>
            <p>智能助手平台</p>
        </div>
        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="login">登录</button>
                <button class="tab" data-tab="register">注册</button>
            </div>
            <div class="form-panel active" id="panel-login">
                <form id="login-form">
                    <div class="form-group"><label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="form-group"><label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn">登录</button>
                </form>
            </div>
            <div class="form-panel" id="panel-register">
                <form id="register-form">
                    <div class="form-group"><label>用户名</label>
                        <input type="text" id="register-username" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="form-group"><label>密码</label>
                        <input type="password" id="register-password" placeholder="请输入密码" required
                            autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn">注册</button>
                </form>
            </div>
        </div>
    </div>
    <script src="/js/entry.js"></script>
</body>

</html>
