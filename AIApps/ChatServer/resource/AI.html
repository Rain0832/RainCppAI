<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain AI — 聊天</title>
<style>
:root {
    --bg: #f8f9fb; --sidebar: #ffffff; --border: #e5e7eb; --text: #1a1a2e;
    --text2: #6b7280; --accent: #4f46e5; --accent-hover: #4338ca; --accent-light: rgba(79,70,229,0.08);
    --msg-user: #4f46e5; --msg-ai: #ffffff; --msg-ai-text: #1a1a2e;
    --input-bg: #ffffff; --chat-bg: #f3f4f6; --shadow: rgba(0,0,0,0.06);
}
[data-theme="dark"] {
    --bg: #0f0f1a; --sidebar: #141425; --border: #2d2d44; --text: #e5e5ef;
    --text2: #9ca3af; --accent: #818cf8; --accent-hover: #6366f1; --accent-light: rgba(129,140,248,0.1);
    --msg-user: #6366f1; --msg-ai: #1e1e36; --msg-ai-text: #e5e5ef;
    --input-bg: #1a1a2e; --chat-bg: #0f0f1a; --shadow: rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; transition: background .3s, color .3s;
}

/* Sidebar */
.sidebar {
    width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; transition: all .3s;
}
.sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
}
.sidebar-header h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text);
}
.new-chat-btn {
    width: 100%; padding: 10px; border: 1px dashed var(--border); border-radius: 10px;
    background: transparent; color: var(--accent); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .2s;
}
.new-chat-btn:hover { background: var(--accent-light); border-color: var(--accent); }
.session-list {
    flex: 1; overflow-y: auto; padding: 8px;
}
.session-item {
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-size: 14px; color: var(--text2); transition: all .15s;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item:hover { background: var(--accent-light); color: var(--text); }
.session-item.active { background: var(--accent); color: #fff; font-weight: 500; }
.sidebar-footer {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px;
}
.sidebar-footer button {
    flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .2s;
}
.sidebar-footer button:hover { border-color: var(--accent); color: var(--accent); }

/* Main chat area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--sidebar);
    flex-shrink: 0;
}
.topbar .back-btn {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 13px; cursor: pointer;
    transition: all .2s; text-decoration: none;
}
.topbar .back-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar label { font-size: 13px; color: var(--text2); margin-left: auto; }
.topbar select {
    padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--input-bg); color: var(--text); font-size: 13px;
    outline: none; cursor: pointer;
}
.topbar .theme-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 16px; transition: all .2s;
}
.topbar .theme-btn:hover { border-color: var(--accent); }

.chat-area {
    flex: 1; overflow-y: auto; padding: 24px 20px; background: var(--chat-bg);
    display: flex; flex-direction: column; gap: 16px;
}
.chat-area:empty::before {
    content: '选择会话或创建新聊天开始对话'; display: block;
    text-align: center; color: var(--text2); font-size: 14px;
    margin: auto; padding: 40px;
}
.msg {
    max-width: 72%; padding: 14px 18px; border-radius: 16px;
    line-height: 1.65; word-wrap: break-word; font-size: 14px;
    animation: fadeMsg .25s ease;
}
.msg.user {
    background: var(--msg-user); color: #fff;
    align-self: flex-end; border-bottom-right-radius: 4px;
}
.msg.assistant {
    background: var(--msg-ai); color: var(--msg-ai-text);
    align-self: flex-start; border-bottom-left-radius: 4px;
    border: 1px solid var(--border); box-shadow: 0 1px 3px var(--shadow);
}
.msg .msg-actions {
    margin-top: 8px; display: flex; gap: 6px;
}
.msg .tts-btn {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
    background: var(--accent-light); color: var(--accent); border: 1px solid transparent;
    transition: all .2s;
}
.msg .tts-btn:hover { border-color: var(--accent); }
@keyframes fadeMsg {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Input */
.input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--sidebar); display: flex; gap: 12px; align-items: flex-end;
}
.input-area textarea {
    flex: 1; resize: none; padding: 12px 14px; font-size: 14px; line-height: 1.5;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--input-bg); color: var(--text);
    outline: none; max-height: 120px; transition: all .2s;
    font-family: inherit;
}
.input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.send-btn {
    padding: 12px 20px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.send-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Toast */
.toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--accent); color: #fff; padding: 10px 24px;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>会话列表</h2>
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    </div>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">
        <button id="syncBtn">同步历史</button>
        <button onclick="window.location.href='/menu'">返回主页</button>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <a class="back-btn" href="/menu">← 返回</a>
        <label>模型</label>
        <select id="modelType">
            <option value="1" selected>阿里百炼</option>
            <option value="2">豆包</option>
            <option value="3">百炼 RAG</option>
            <option value="4">百炼 MCP</option>
        </select>
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <form class="input-area" id="chatForm">
        <textarea id="question" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
        <button type="submit" class="send-btn" id="sendBtn">发送</button>
    </form>
</div>

<script>
const $ = s => document.querySelector(s);

// Theme
function initTheme() {
    const t = localStorage.getItem('rain-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    $('#themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}
$('#themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('rain-theme', next);
    $('#themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
});
initTheme();

function showToast(msg) {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// State
let currentSessionId = null, tempSession = false;
const sessions = {};

// Render
function renderSessions() {
    const el = $('#sessionList'); el.innerHTML = '';
    for (let id in sessions) {
        const div = document.createElement('div');
        div.className = 'session-item' + (id === currentSessionId ? ' active' : '');
        div.textContent = sessions[id].name || `会话 ${id.slice(0, 8)}`;
        div.onclick = () => switchSession(id);
        el.appendChild(div);
    }
}

function appendMsg(role, content) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const safeHtml = DOMPurify.sanitize(marked.parse(content));
    let html = `<div>${role === 'user' ? '' : ''}<span>${safeHtml}</span></div>`;
    if (role === 'assistant') {
        const escaped = content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
        html += `<div class="msg-actions"><button class="tts-btn" onclick="playTTS(\`${escaped}\`)">🔊 朗读</button></div>`;
    }
    div.innerHTML = html;
    $('#chatArea').appendChild(div);
    $('#chatArea').scrollTop = $('#chatArea').scrollHeight;
}

function clearChat() { $('#chatArea').innerHTML = ''; }

async function switchSession(id) {
    currentSessionId = String(id); tempSession = false; clearChat();
    if (!sessions[id].messages || !sessions[id].messages.length) {
        try {
            const res = await fetch('/chat/history', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: currentSessionId })
            });
            const data = await res.json();
            if (data.success && Array.isArray(data.history)) {
                sessions[id].messages = data.history.map(m => ({
                    role: m.is_user ? 'user' : 'assistant', content: m.content
                }));
            }
        } catch (e) { console.error(e); }
    }
    (sessions[id].messages || []).forEach(m => appendMsg(m.role, m.content));
    renderSessions();
}

// TTS
async function playTTS(text) {
    try {
        const res = await fetch('/chat/tts', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.success && data.url) new Audio(data.url).play();
        else showToast('语音合成失败');
    } catch (e) { showToast('语音请求失败'); }
}

// New chat
$('#newChatBtn').addEventListener('click', () => {
    currentSessionId = 'temp'; tempSession = true; clearChat();
    renderSessions();
});

// Auto-resize textarea
const ta = $('#question');
ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        $('#chatForm').dispatchEvent(new Event('submit'));
    }
});

// Send
$('#chatForm').addEventListener('submit', async e => {
    e.preventDefault();
    const q = ta.value.trim();
    if (!q) return;

    appendMsg('user', q);
    ta.value = ''; ta.style.height = 'auto';
    $('#sendBtn').disabled = true;

    try {
        if (tempSession) {
            const res = await fetch('/chat/send-new-session', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, modelType: $('#modelType').value })
            });
            const data = await res.json();
            if (data.success) {
                const sid = String(data.sessionId);
                sessions[sid] = {
                    name: q.slice(0, 20) + (q.length > 20 ? '...' : ''),
                    messages: [
                        { role: 'user', content: q },
                        { role: 'assistant', content: data.Information }
                    ]
                };
                currentSessionId = sid; tempSession = false;
                renderSessions();
                appendMsg('assistant', data.Information);
            } else {
                appendMsg('assistant', '错误: ' + (data.message || '未知错误'));
            }
        } else {
            if (!sessions[currentSessionId]) {
                showToast('请先选择或创建会话');
                $('#sendBtn').disabled = false;
                return;
            }
            sessions[currentSessionId].messages.push({ role: 'user', content: q });
            const res = await fetch('/chat/send', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, modelType: $('#modelType').value, sessionId: currentSessionId })
            });
            const data = await res.json();
            if (data.success) {
                appendMsg('assistant', data.Information);
                sessions[currentSessionId].messages.push({ role: 'assistant', content: data.Information });
            } else {
                appendMsg('assistant', '错误: ' + (data.message || '未知错误'));
            }
        }
    } catch (err) {
        appendMsg('assistant', '无法连接到服务器');
    }
    $('#sendBtn').disabled = false;
});

// Sync
$('#syncBtn').addEventListener('click', async () => {
    if (!currentSessionId || tempSession) { showToast('请选择已有会话'); return; }
    try {
        const res = await fetch('/chat/history', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: currentSessionId })
        });
        const data = await res.json();
        if (data.success && Array.isArray(data.history)) {
            sessions[currentSessionId].messages = [];
            clearChat();
            data.history.forEach(m => {
                const role = m.is_user ? 'user' : 'assistant';
                appendMsg(role, m.content);
                sessions[currentSessionId].messages.push({ role, content: m.content });
            });
            showToast('同步完成');
        }
    } catch (e) { showToast('同步失败'); }
});

// Load sessions
async function loadSessions() {
    try {
        const res = await fetch('/chat/sessions');
        const data = await res.json();
        if (data.success && Array.isArray(data.sessions)) {
            data.sessions.forEach(s => {
                const sid = String(s.sessionId);
                sessions[sid] = { name: s.name || `会话 ${sid.slice(0, 8)}`, messages: [] };
            });
            renderSessions();
        }
    } catch (e) { console.error(e); }
}
loadSessions();
</script>
</body>
</html>
