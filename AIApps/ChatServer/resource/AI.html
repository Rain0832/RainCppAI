<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain AI — 聊天</title>
<style>
:root {
    --bg: #f5f7fa; --sidebar: #ffffff; --border: #e2e8f0; --text: #1e293b;
    --text2: #64748b; --accent: #6366f1; --accent-hover: #4f46e5;
    --accent-light: rgba(99,102,241,0.07); --msg-user: #6366f1; --msg-ai: #ffffff;
    --msg-ai-text: #1e293b; --input-bg: #ffffff; --chat-bg: #f0f2f5;
    --shadow: rgba(0,0,0,0.04); --glow: rgba(99,102,241,0.06);
}
[data-theme="dark"] {
    --bg: #0c0c18; --sidebar: #12121f; --border: #252540; --text: #e2e8f0;
    --text2: #94a3b8; --accent: #818cf8; --accent-hover: #6366f1;
    --accent-light: rgba(129,140,248,0.08); --msg-user: #6366f1; --msg-ai: #1a1a30;
    --msg-ai-text: #e2e8f0; --input-bg: #161625; --chat-bg: #0a0a14;
    --shadow: rgba(0,0,0,0.2); --glow: rgba(129,140,248,0.04);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; transition: background .3s, color .3s; overflow: hidden;
}
.sidebar {
    width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.new-chat-btn {
    width: 100%; padding: 10px; border: 1px dashed var(--border); border-radius: 10px;
    background: transparent; color: var(--accent); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
}
.new-chat-btn:hover { background: var(--accent-light); border-color: var(--accent); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item {
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-size: 13px; color: var(--text2); transition: all .15s;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item:hover { background: var(--accent-light); color: var(--text); }
.session-item.active { background: var(--accent); color: #fff; font-weight: 500; }
.sidebar-footer {
    padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px;
}
.sidebar-footer button {
    flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all .2s;
}
.sidebar-footer button:hover { border-color: var(--accent); color: var(--accent); }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; background: var(--sidebar); flex-shrink: 0;
}
.topbar .back-btn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .2s; text-decoration: none;
}
.topbar .back-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar label { font-size: 12px; color: var(--text2); margin-left: auto; }
.topbar select {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--input-bg); color: var(--text); font-size: 12px; outline: none; cursor: pointer;
}
.topbar .theme-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 15px; transition: all .2s;
}
.topbar .theme-btn:hover { border-color: var(--accent); }

.chat-area {
    flex: 1; overflow-y: auto; padding: 24px 20px; background: var(--chat-bg);
    display: flex; flex-direction: column; gap: 14px;
}
.welcome-hint {
    text-align: center; color: var(--text2); font-size: 14px;
    margin: auto; padding: 40px 20px; line-height: 1.8;
}
.welcome-hint .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
.msg {
    max-width: 72%; padding: 12px 16px; border-radius: 14px;
    line-height: 1.65; word-wrap: break-word; font-size: 14px;
    animation: fadeMsg .2s ease;
}
.msg.user {
    background: var(--msg-user); color: #fff;
    align-self: flex-end; border-bottom-right-radius: 4px;
}
.msg.assistant {
    background: var(--msg-ai); color: var(--msg-ai-text);
    align-self: flex-start; border-bottom-left-radius: 4px;
    border: 1px solid var(--border); box-shadow: 0 1px 2px var(--shadow);
}
.msg .msg-actions { margin-top: 6px; display: flex; gap: 4px; }
.msg .tts-btn {
    padding: 3px 8px; border-radius: 5px; font-size: 10px; cursor: pointer;
    background: var(--accent-light); color: var(--accent); border: 1px solid transparent; transition: all .2s;
}
.msg .tts-btn:hover { border-color: var(--accent); }
@keyframes fadeMsg { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.input-area {
    padding: 14px 20px; border-top: 1px solid var(--border);
    background: var(--sidebar); display: flex; gap: 10px; align-items: flex-end;
}
.input-area textarea {
    flex: 1; resize: none; padding: 10px 12px; font-size: 14px; line-height: 1.5;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--input-bg); color: var(--text);
    outline: none; max-height: 120px; transition: all .2s; font-family: inherit;
}
.input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
.send-btn {
    padding: 10px 18px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.send-btn:hover { background: var(--accent-hover); transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(99,102,241,0.2);
}
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--accent); color: #fff; padding: 10px 24px;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sidebar">
    <div class="sidebar-header">
        <h2>会话列表</h2>
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    </div>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">
        <button id="syncBtn">同步历史</button>
        <button onclick="location.href='/menu'">返回主页</button>
    </div>
</div>
<div class="main">
    <div class="topbar">
        <a class="back-btn" href="/menu">← 返回</a>
        <label>模型</label>
        <select id="modelType">
            <option value="1" selected>阿里百炼</option>
            <option value="2">豆包</option>
            <option value="3">百炼 RAG</option>
            <option value="4">百炼 MCP</option>
        </select>
        <button class="theme-btn" id="themeToggle">☀️</button>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="welcome-hint" id="welcomeHint">
            <span class="emoji">💬</span>
            选择左侧会话或点击「新建对话」开始聊天<br>
            <small>Enter 发送 · Shift+Enter 换行</small>
        </div>
    </div>
    <form class="input-area" id="chatForm" style="display:none">
        <textarea id="question" placeholder="输入消息..." rows="1"></textarea>
        <button type="submit" class="send-btn" id="sendBtn">发送</button>
    </form>
</div>
<script>
const $ = s => document.querySelector(s);

// Theme — 从 localStorage 读取并应用
function initTheme() {
    const t = localStorage.getItem('rain-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    $('#themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}
$('#themeToggle').onclick = () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('rain-theme', next);
    $('#themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
};
initTheme();

function showToast(msg) {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

let currentSessionId = null, tempSession = false;
const sessions = {};

function renderSessions() {
    const el = $('#sessionList'); el.innerHTML = '';
    for (let id in sessions) {
        const d = document.createElement('div');
        d.className = 'session-item' + (id === currentSessionId ? ' active' : '');
        d.textContent = sessions[id].name || `会话 ${id.slice(0, 8)}`;
        d.onclick = () => switchSession(id);
        el.appendChild(d);
    }
}

function hideWelcome() {
    const h = $('#welcomeHint'); if (h) h.remove();
}

function appendMsg(role, content) {
    hideWelcome();
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const safe = DOMPurify.sanitize(marked.parse(content));
    let html = `<div><span>${safe}</span></div>`;
    if (role === 'assistant') {
        const esc = content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
        html += `<div class="msg-actions"><button class="tts-btn" onclick="playTTS(\`${esc}\`)">🔊 朗读</button></div>`;
    }
    d.innerHTML = html;
    $('#chatArea').appendChild(d);
    $('#chatArea').scrollTop = $('#chatArea').scrollHeight;
}

function clearChat() { $('#chatArea').innerHTML = ''; }

async function switchSession(id) {
    currentSessionId = String(id); tempSession = false; clearChat();
    $('#chatForm').style.display = 'flex';
    if (!sessions[id].messages?.length) {
        try {
            const r = await fetch('/chat/history', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: currentSessionId }) });
            const d = await r.json();
            if (d.success && Array.isArray(d.history))
                sessions[id].messages = d.history.map(m => ({ role: m.is_user ? 'user' : 'assistant', content: m.content }));
        } catch (e) { console.error(e); }
    }
    if (sessions[id].messages?.length)
        sessions[id].messages.forEach(m => appendMsg(m.role, m.content));
    else {
        const hint = document.createElement('div');
        hint.className = 'welcome-hint';
        hint.innerHTML = '<span class="emoji">✨</span>开始新对话吧';
        $('#chatArea').appendChild(hint);
    }
    renderSessions();
}

async function playTTS(text) {
    try {
        const r = await fetch('/chat/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
        const d = await r.json();
        if (d.success && d.url) new Audio(d.url).play(); else showToast('语音合成失败');
    } catch (e) { showToast('语音请求失败'); }
}

$('#newChatBtn').onclick = () => {
    currentSessionId = 'temp'; tempSession = true; clearChat();
    $('#chatForm').style.display = 'flex';
    const hint = document.createElement('div');
    hint.className = 'welcome-hint';
    hint.innerHTML = '<span class="emoji">✨</span>输入你的第一条消息';
    $('#chatArea').appendChild(hint);
    renderSessions();
    $('#question').focus();
};

const ta = $('#question');
ta.oninput = () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; };
ta.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $('#chatForm').dispatchEvent(new Event('submit')); } };

// 根据模型类型获取对应的 API Key
function getApiKey(modelType) {
    const map = { '1': 'rain-key-dashscope', '2': 'rain-key-doubao', '3': 'rain-key-dashscope', '4': 'rain-key-dashscope' };
    return localStorage.getItem(map[modelType] || '') || '';
}

$('#chatForm').onsubmit = async e => {
    e.preventDefault();
    const q = ta.value.trim(); if (!q) return;
    if (!currentSessionId && !tempSession) { showToast('请先新建对话或选择会话'); return; }
    const mt = $('#modelType').value;
    const ak = getApiKey(mt);

    appendMsg('user', q);
    ta.value = ''; ta.style.height = 'auto';
    $('#sendBtn').disabled = true;

    try {
        if (tempSession) {
            const r = await fetch('/chat/send-new-session', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, modelType: mt, apiKey: ak }) });
            const d = await r.json();
            if (d.success) {
                const sid = String(d.sessionId);
                sessions[sid] = { name: q.slice(0, 20) + (q.length > 20 ? '...' : ''),
                    messages: [{ role: 'user', content: q }, { role: 'assistant', content: d.Information }] };
                currentSessionId = sid; tempSession = false;
                renderSessions(); appendMsg('assistant', d.Information);
            } else appendMsg('assistant', '错误: ' + (d.message || '未知错误'));
        } else {
            if (!sessions[currentSessionId]) { showToast('请先选择或创建会话'); $('#sendBtn').disabled = false; return; }
            sessions[currentSessionId].messages.push({ role: 'user', content: q });
            const r = await fetch('/chat/send', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, modelType: mt, sessionId: currentSessionId, apiKey: ak }) });
            const d = await r.json();
            if (d.success) { appendMsg('assistant', d.Information);
                sessions[currentSessionId].messages.push({ role: 'assistant', content: d.Information });
            } else appendMsg('assistant', '错误: ' + (d.message || '未知错误'));
        }
    } catch (err) { appendMsg('assistant', '无法连接到服务器'); }
    $('#sendBtn').disabled = false;
};

$('#syncBtn').onclick = async () => {
    if (!currentSessionId || tempSession) { showToast('请选择已有会话'); return; }
    try {
        const r = await fetch('/chat/history', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: currentSessionId }) });
        const d = await r.json();
        if (d.success && Array.isArray(d.history)) {
            sessions[currentSessionId].messages = []; clearChat();
            d.history.forEach(m => { const role = m.is_user ? 'user' : 'assistant';
                appendMsg(role, m.content); sessions[currentSessionId].messages.push({ role, content: m.content }); });
            showToast('同步完成');
        }
    } catch (e) { showToast('同步失败'); }
};

(async () => {
    try {
        const r = await fetch('/chat/sessions'); const d = await r.json();
        if (d.success && Array.isArray(d.sessions)) {
            d.sessions.forEach(s => { const sid = String(s.sessionId);
                sessions[sid] = { name: s.name || `会话 ${sid.slice(0, 8)}`, messages: [] }; });
            renderSessions();
        }
    } catch (e) { console.error(e); }
})();
</script>
</body>
</html>
