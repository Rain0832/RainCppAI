<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Rain AI</title>
<style>
:root {
    --bg: #f8f9fb; --card: #ffffff; --border: #e5e7eb; --text: #1a1a2e;
    --text2: #6b7280; --accent: #4f46e5; --accent-hover: #4338ca;
}
[data-theme="dark"] {
    --bg: #0f0f1a; --card: #1a1a2e; --border: #2d2d44; --text: #e5e5ef;
    --text2: #9ca3af; --accent: #818cf8; --accent-hover: #6366f1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; transition: background .3s, color .3s;
}
.container { text-align: center; padding: 40px; }
.code {
    font-size: 96px; font-weight: 800; letter-spacing: -4px;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
}
.msg { font-size: 18px; color: var(--text2); margin: 16px 0 32px; }
.btn {
    display: inline-block; padding: 12px 28px; font-size: 15px; font-weight: 600;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; text-decoration: none; transition: all .2s;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
</style>
</head>
<body>
<div class="container">
    <div class="code">404</div>
    <p class="msg">页面不存在或已被移除</p>
    <a href="/menu" class="btn">返回首页</a>
</div>
<script>
const t = localStorage.getItem('rain-theme') || 'light';
document.documentElement.setAttribute('data-theme', t);
</script>
</body>
</html>
