<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Rain AI</title>
<style>
:root { --bg: #f5f7fa; --text: #1e293b; --text2: #64748b; --accent: #6366f1; --accent-hover: #4f46e5; }
[data-theme="dark"] { --bg: #0c0c18; --text: #e2e8f0; --text2: #94a3b8; --accent: #818cf8; --accent-hover: #6366f1; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
}
.container { text-align: center; padding: 40px; }
.code {
    font-size: 96px; font-weight: 800; letter-spacing: -4px; line-height: 1;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.msg { font-size: 16px; color: var(--text2); margin: 16px 0 32px; }
.btn {
    display: inline-block; padding: 10px 24px; font-size: 14px; font-weight: 600;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; text-decoration: none; transition: all .2s;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
</style>
</head>
<body>
<div class="container">
    <div class="code">404</div>
    <p class="msg">页面不存在或已被移除</p>
    <a href="/menu" class="btn">返回首页</a>
</div>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('rain-theme') || 'light');</script>
</body>
</html>
