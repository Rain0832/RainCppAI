<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain AI — 图像识别</title>
<style>
:root {
    --bg: #f5f7fa; --card: #ffffff; --border: #e2e8f0; --text: #1e293b;
    --text2: #64748b; --accent: #6366f1; --accent-hover: #4f46e5;
    --accent-light: rgba(99,102,241,0.07); --msg-user: #6366f1;
    --msg-ai: #ffffff; --msg-ai-text: #1e293b;
    --chat-bg: #f0f2f5; --shadow: rgba(0,0,0,0.04);
}
[data-theme="dark"] {
    --bg: #0c0c18; --card: #161625; --border: #252540; --text: #e2e8f0;
    --text2: #94a3b8; --accent: #818cf8; --accent-hover: #6366f1;
    --accent-light: rgba(129,140,248,0.08); --msg-user: #6366f1;
    --msg-ai: #1a1a30; --msg-ai-text: #e2e8f0;
    --chat-bg: #0a0a14; --shadow: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
    transition: background .3s, color .3s; overflow: hidden;
}
.topbar {
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--card); display: flex; align-items: center; gap: 12px;
}
.back-btn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .2s; text-decoration: none;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar h2 {
    font-size: 15px; font-weight: 600; flex: 1;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.theme-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 15px; transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); }
.chat-area {
    flex: 1; overflow-y: auto; padding: 24px 20px; background: var(--chat-bg);
    display: flex; flex-direction: column; gap: 14px;
}
.welcome-hint {
    text-align: center; color: var(--text2); font-size: 14px;
    margin: auto; padding: 40px 20px;
}
.welcome-hint .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
.msg {
    max-width: 72%; padding: 12px 16px; border-radius: 14px;
    line-height: 1.65; word-wrap: break-word; font-size: 14px; animation: fadeMsg .2s ease;
}
.msg.user { background: var(--msg-user); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.assistant {
    background: var(--msg-ai); color: var(--msg-ai-text); align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 1px 2px var(--shadow);
}
.msg img { max-width: 200px; border-radius: 10px; margin-top: 8px; box-shadow: 0 2px 8px var(--shadow); }
@keyframes fadeMsg { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.input-area {
    padding: 14px 20px; border-top: 1px solid var(--border);
    background: var(--card); display: flex; gap: 10px; align-items: center;
}
.file-label {
    flex: 1; padding: 12px 16px; border: 2px dashed var(--border); border-radius: 12px;
    text-align: center; cursor: pointer; transition: all .2s; color: var(--text2); font-size: 13px;
}
.file-label:hover { border-color: var(--accent); color: var(--accent); }
.file-label.has-file { border-color: var(--accent); color: var(--accent); border-style: solid; }
.file-input { display: none; }
.send-btn {
    padding: 10px 18px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.send-btn:hover { background: var(--accent-hover); transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(99,102,241,0.2); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="topbar">
    <a class="back-btn" href="/menu">← 返回</a>
    <h2>图像识别</h2>
    <button class="theme-btn" id="themeToggle">☀️</button>
</div>
<div class="chat-area" id="chatArea">
    <div class="welcome-hint"><span class="emoji">🖼</span>上传图片开始识别</div>
</div>
<form class="input-area" id="uploadForm">
    <label class="file-label" id="fileLabel">
        点击选择图片
        <input type="file" class="file-input" id="imageInput" accept="image/*" required>
    </label>
    <button type="submit" class="send-btn" id="sendBtn">识别</button>
</form>
<script>
const $ = s => document.querySelector(s);
function initTheme() {
    const t = localStorage.getItem('rain-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    $('#themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}
$('#themeToggle').onclick = () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('rain-theme', next);
    $('#themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
};
initTheme();

$('#imageInput').onchange = () => {
    const f = $('#imageInput').files[0];
    if (f) { $('#fileLabel').textContent = f.name; $('#fileLabel').classList.add('has-file'); }
};
function appendMsg(role, content, imgUrl) {
    // 移除欢迎提示
    const hint = document.querySelector('.welcome-hint'); if (hint) hint.remove();
    const d = document.createElement('div'); d.className = 'msg ' + role;
    d.innerHTML = content;
    if (imgUrl) { const img = document.createElement('img'); img.src = imgUrl; d.appendChild(img); }
    $('#chatArea').appendChild(d); $('#chatArea').scrollTop = $('#chatArea').scrollHeight;
}
$('#uploadForm').onsubmit = async e => {
    e.preventDefault();
    if (!$('#imageInput').files.length) return;
    const file = $('#imageInput').files[0];
    const reader = new FileReader();
    reader.onload = async ev => {
        const b64Url = ev.target.result, b64Data = b64Url.split(',')[1];
        appendMsg('user', `上传图片: ${file.name}`, b64Url);
        $('#sendBtn').disabled = true;
        try {
            const r = await fetch('/upload/send', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: file.name, image: b64Data }) });
            if (!r.ok) throw new Error('上传失败');
            const d = await r.json();
            appendMsg('assistant', `识别结果: <strong>${d.class_name}</strong><br>置信度: ${Math.round(d.confidence * 100)}%`);
        } catch (err) { appendMsg('assistant', `错误: ${err.message}`); }
        $('#sendBtn').disabled = false;
        $('#imageInput').value = '';
        $('#fileLabel').textContent = '点击选择图片'; $('#fileLabel').classList.remove('has-file');
    };
    reader.readAsDataURL(file);
};
</script>
</body>
</html>
