<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain AI — 图像识别</title>
<style>
:root {
    --bg: #f8f9fb; --card: #ffffff; --border: #e5e7eb; --text: #1a1a2e;
    --text2: #6b7280; --accent: #4f46e5; --accent-hover: #4338ca; --accent-light: rgba(79,70,229,0.08);
    --msg-user: #4f46e5; --msg-ai: #ffffff; --msg-ai-text: #1a1a2e;
    --chat-bg: #f3f4f6; --shadow: rgba(0,0,0,0.06);
}
[data-theme="dark"] {
    --bg: #0f0f1a; --card: #1a1a2e; --border: #2d2d44; --text: #e5e5ef;
    --text2: #9ca3af; --accent: #818cf8; --accent-hover: #6366f1; --accent-light: rgba(129,140,248,0.1);
    --msg-user: #6366f1; --msg-ai: #1e1e36; --msg-ai-text: #e5e5ef;
    --chat-bg: #0f0f1a; --shadow: rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
    transition: background .3s, color .3s;
}
.topbar {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--card); display: flex; align-items: center; gap: 12px;
}
.back-btn {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 13px; cursor: pointer;
    transition: all .2s; text-decoration: none;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar h2 {
    font-size: 16px; font-weight: 600; flex: 1;
    background: linear-gradient(135deg, var(--accent), #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.theme-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 16px; transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); }
.chat-area {
    flex: 1; overflow-y: auto; padding: 24px 20px; background: var(--chat-bg);
    display: flex; flex-direction: column; gap: 16px;
}
.chat-area:empty::before {
    content: '上传图片开始识别'; display: block; text-align: center;
    color: var(--text2); font-size: 14px; margin: auto; padding: 40px;
}
.msg {
    max-width: 72%; padding: 14px 18px; border-radius: 16px;
    line-height: 1.65; word-wrap: break-word; font-size: 14px;
    animation: fadeMsg .25s ease;
}
.msg.user {
    background: var(--msg-user); color: #fff;
    align-self: flex-end; border-bottom-right-radius: 4px;
}
.msg.assistant {
    background: var(--msg-ai); color: var(--msg-ai-text);
    align-self: flex-start; border-bottom-left-radius: 4px;
    border: 1px solid var(--border); box-shadow: 0 1px 3px var(--shadow);
}
.msg img {
    max-width: 200px; border-radius: 10px; margin-top: 8px;
    box-shadow: 0 2px 8px var(--shadow);
}
@keyframes fadeMsg {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}
.input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--card); display: flex; gap: 12px; align-items: center;
}
.file-label {
    flex: 1; padding: 12px 16px; border: 2px dashed var(--border); border-radius: 12px;
    text-align: center; cursor: pointer; transition: all .2s; color: var(--text2);
    font-size: 14px;
}
.file-label:hover { border-color: var(--accent); color: var(--accent); }
.file-label.has-file { border-color: var(--accent); color: var(--accent); border-style: solid; }
.file-input { display: none; }
.send-btn {
    padding: 12px 20px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.send-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="topbar">
    <a class="back-btn" href="/menu" onclick="event.preventDefault();window.location.href='/menu'">← 返回</a>
    <h2>图像识别</h2>
    <button class="theme-btn" id="themeToggle">☀️</button>
</div>

<div class="chat-area" id="chatArea"></div>

<form class="input-area" id="uploadForm">
    <label class="file-label" id="fileLabel">
        点击选择图片或拖拽到此处
        <input type="file" class="file-input" id="imageInput" accept="image/*" required>
    </label>
    <button type="submit" class="send-btn" id="sendBtn">识别</button>
</form>

<script>
const $ = s => document.querySelector(s);
function initTheme() {
    const t = localStorage.getItem('rain-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    $('#themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}
$('#themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('rain-theme', next);
    $('#themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
});
initTheme();

$('#imageInput').addEventListener('change', () => {
    const f = $('#imageInput').files[0];
    if (f) {
        $('#fileLabel').textContent = f.name;
        $('#fileLabel').classList.add('has-file');
    }
});

function appendMsg(role, content, imageUrl) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = content;
    if (imageUrl) {
        const img = document.createElement('img');
        img.src = imageUrl; div.appendChild(img);
    }
    $('#chatArea').appendChild(div);
    $('#chatArea').scrollTop = $('#chatArea').scrollHeight;
}

$('#uploadForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!$('#imageInput').files.length) return;
    const file = $('#imageInput').files[0];
    const reader = new FileReader();
    reader.onload = async ev => {
        const base64Url = ev.target.result;
        const base64Data = base64Url.split(',')[1];
        appendMsg('user', `上传图片: ${file.name}`, base64Url);
        $('#sendBtn').disabled = true;
        try {
            const res = await fetch('/upload/send', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: file.name, image: base64Data })
            });
            if (!res.ok) throw new Error('上传失败');
            const data = await res.json();
            appendMsg('assistant', `识别结果: <strong>${data.class_name}</strong><br>置信度: ${Math.round(data.confidence * 100)}%`);
        } catch (err) {
            appendMsg('assistant', `错误: ${err.message}`);
        }
        $('#sendBtn').disabled = false;
        $('#imageInput').value = '';
        $('#fileLabel').textContent = '点击选择图片或拖拽到此处';
        $('#fileLabel').classList.remove('has-file');
    };
    reader.readAsDataURL(file);
});
</script>
</body>
</html>
